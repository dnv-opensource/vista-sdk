name: .NET Package

on:
  push:
    branches: [main]
    paths: ["csharp/**", ".github/workflows/build-csharp.yml"]
  pull_request:
    branches: [main]
    paths: ["csharp/**", ".github/workflows/build-csharp.yml"]
  workflow_dispatch:

env:
  CI_BUILD: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: csharp/

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # Full history needed for revision count

      - name: Get revision number
        id: rev
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "count=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
          else
            echo "count=$(git rev-list --count ${LATEST_TAG}..HEAD)" >> $GITHUB_OUTPUT
          fi
          echo "Revision: $(cat $GITHUB_OUTPUT)"

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Install dependencies
        run: dotnet restore Build.csproj

      - name: Prebuild
        run: dotnet build ./src/Vista.SDK.SourceGenerator/Vista.SDK.SourceGenerator.csproj --no-restore -c Release

      - name: Build
        run: dotnet build Build.csproj --no-restore -c Release

      - name: Test
        run: dotnet test Build.csproj --no-build --verbosity normal -c Release

      - name: Context
        run: echo echo "$(pwd)" && find . -path "src/*/*.*sproj"

      - name: Pack
        run: find . -path "./src/*/*.*sproj" | xargs -n 1 -t dotnet pack --no-build --verbosity normal -c Release -o artifacts/ /p:Version=0.3.1-preview-${{ steps.rev.outputs.count }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nuget-packages
          path: csharp/artifacts/

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ success() && !github.base_ref }}
    permissions:
      id-token: write # Enable GitHub OIDC token issuance for trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nuget-packages
          path: artifacts/

      - name: Setup dotnet
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x

      - name: NuGet login (OIDC)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push
        run: dotnet nuget push artifacts/**.nupkg -s https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
